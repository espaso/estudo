 
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Operacional - UpBar & DownBar + Filtros</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        .section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .section-title {
            font-size: 1.25rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .title-setup { color: var(--accent-blue); }
        .title-filter { color: var(--accent-orange); }
        .title-buy { color: var(--accent-green); }
        .title-sell { color: var(--accent-red); }
        .title-mgmt { color: #a855f7; }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0.75rem;
            cursor: pointer;
            user-select: none;
        }

        .checklist-item:last-child {
            margin-bottom: 0;
        }

        .checklist-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid var(--text-muted);
            border-radius: 4px;
            margin-right: 0.75rem;
            margin-top: 0.2rem;
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
            background-color: transparent;
            transition: all 0.2s ease;
        }

        .checklist-item input[type="checkbox"]:checked {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .checklist-item input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .checklist-text {
            font-size: 1rem;
            color: var(--text-main);
            transition: color 0.2s ease;
        }

        .checklist-item input[type="checkbox"]:checked ~ .checklist-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .badge {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            margin-left: 0.5rem;
            text-transform: uppercase;
        }

        .badge-critical {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .badge-info {
            background-color: rgba(59, 130, 246, 0.2);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
        }

        .btn-reset {
            display: block;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.2s ease;
        }

        .btn-reset:hover {
            background-color: var(--border-color);
            border-color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Checklist Prático: UpBar e DownBar + Filtros</h1>
        <p>Estratégia Operacional Baseada em Tendência e Força de Mercado</p>
    </header>

    <!-- Seção 1 -->
    <div class="section">
        <h2 class="section-title title-setup">1. Configuração do Gráfico (Setup Inicial)</h2>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text"><strong>Média Móvel Exponencial (MME) de 20 períodos:</strong> Aplicada ao fechamento (Direção da tendência).</span>
        </label>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text"><strong>Indicador ADX de 14 períodos:</strong> Com uma linha horizontal marcada no nível de 25 (Força da tendência).</span>
        </label>
    </div>

    <!-- Seção 2 -->
    <div class="section">
        <h2 class="section-title title-filter">2. Filtros de Mercado (Validação)</h2>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text"><strong>ADX abaixo de 25?</strong> Se estiver abaixo de 25, o mercado está sem força direcional. <strong>Fique de fora</strong> e ignore qualquer sinal.<span class="badge badge-critical">Filtro Crítico</span></span>
        </label>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text"><strong>ADX acima de 25?</strong> Sinal verde para operar. O mercado possui uma tendência forte ativa.</span>
        </label>
    </div>

    <!-- Seção 3 -->
    <div class="section">
        <h2 class="section-title title-buy">3. Gatilho para Operações de COMPRA</h2>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text">O preço deve estar rodando <strong>acima da MME 20</strong>.</span>
        </label>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text">A MME 20 deve estar visivelmente inclinada para cima.</span>
        </label>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text">Aguardar o preço fazer uma breve correção (uma ou duas DownBars se aproximando da média).</span>
        </label>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text"><strong>O Gatilho:</strong> Entrar no exato momento em que um candle <strong>rompe a máxima do candle anterior</strong>, formando a <strong>UpBar</strong>.</span>
        </label>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text"><strong>Stop Loss:</strong> Posicionado logo abaixo da mínima da UpBar que gerou o sinal.</span>
        </label>
    </div>

    <!-- Seção 4 -->
    <div class="section">
        <h2 class="section-title title-sell">4. Gatilho para Operações de VENDA</h2>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text">O preço deve estar rodando <strong>abaixo da MME 20</strong>.</span>
        </label>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text">A MME 20 deve estar visivelmente inclinada para baixo.</span>
        </label>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text">Aguardar o preço fazer um repique rápido (uma ou duas UpBars subindo em direção à média).</span>
        </label>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text"><strong>O Gatilho:</strong> Entrar no exato momento em que um candle <strong>rompe a mínima do candle anterior</strong>, formando a <strong>DownBar</strong>.</span>
        </label>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text"><strong>Stop Loss:</strong> Posicionado logo acima da máxima da DownBar que gerou o sinal.</span>
        </label>
    </div>

    <!-- Seção 5 -->
    <div class="section">
        <h2 class="section-title title-mgmt">5. Gerenciamento de Risco e Alvo</h2>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text">Calcular a distância em pontos/ticks entre a entrada e o Stop Loss.</span>
        </label>
        <label class="checklist-item">
            <input type="checkbox">
            <span class="checklist-text">Projetar o **Alvo (Take Profit)** com base em uma proporção de risco/retorno de pelo menos <strong>2:1</strong> (buscar duas vezes o valor financeiro do risco).</span>
        </label>
    </div>

    <button class="btn-reset" onclick="resetChecklist()">Limpar Checklist</button>
</div>

<script>
    function resetChecklist() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(checkbox => checkbox.checked = false);
    }
</script>

</body>
</html>
